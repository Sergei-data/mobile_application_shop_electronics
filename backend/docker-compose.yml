
# docker compose up -d
# docker compose exec api alembic upgrade head
# docker compose --profile manual run --rm seed
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./seed/images:/seed/images:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345;
      mc mb -p local/product-images || true;
      mc anonymous set download local/product-images || true;
      mc mirror --overwrite /seed/images local/product-images;
      echo 'MinIO seed done';
      "

  api:
    build: .
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_REALM: "shop"
      JWT_AUDIENCE: ""
      KEYCLOAK_INTERNAL_BASE_URL: "http://keycloak:8080"
      KEYCLOAK_ISSUER_URLS: '["http://10.0.2.2:8080/realms/shop","http://localhost:8080/realms/shop"]'
      PUBLIC_S3_BASE: "http://10.0.2.2:9000"
      S3_BUCKET: "product-images"
      TZ: "Europe/Berlin"
      DATABASE_URL: "postgresql+asyncpg://shop:shop@db:5432/shop"
      S3_PUBLIC_BASE_URL: "http://10.0.2.2:9000"
      S3_BUCKET_NAME: "product-images"
      ENV: "dev"
      SEED_ON_STARTUP: "false"
    depends_on:
      keycloak:
        condition: service_healthy
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    

  seed:
    build: .
    volumes:
      - ./:/app
    profiles: ["manual"]
    environment:
      PUBLIC_S3_BASE: "http://10.0.2.2:9000"
      S3_BUCKET: "product-images"
      TZ: "Europe/Berlin"
      DATABASE_URL: "postgresql+asyncpg://shop:shop@db:5432/shop"
      S3_PUBLIC_BASE_URL: "http://10.0.2.2:9000"
      S3_BUCKET_NAME: "product-images"
      ENV: "dev"
    depends_on:
      db:
        condition: service_healthy
    command: python -m seed.seed_run



  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 3s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
  minio_data:
  keycloak_pgdata:
